services:
  broker:
    image: apache/kafka:4.1.1
    hostname: broker
    container_name: broker
    ports:
      - "29092:29092"
    environment:
      # KRaft (combined controller + broker) single-node setup
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@broker:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      # Listeners
      # - PLAINTEXT: intra-container / cluster communication
      # - PLAINTEXT_HOST: host access (mapped to 29092)
      # - CONTROLLER: KRaft controller quorum
      KAFKA_LISTENERS: "CONTROLLER://:9093,PLAINTEXT://:9092,PLAINTEXT_HOST://:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://broker:9092,PLAINTEXT_HOST://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"

      # Required for KRaft formatting / startup
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"

      # Single-node safe defaults
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # Optional features (keep enabled for dev)
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
